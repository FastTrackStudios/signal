name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NIXPKGS_ALLOW_UNFREE: 1

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Allow unprivileged user namespaces (bwrap needs this)
        run: |
          if [ -f /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]; then
            echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns
          fi
          sudo sysctl -w kernel.unprivileged_userns_clone=1 2>/dev/null || true

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - uses: cachix/cachix-action@v15
        with:
          name: fasttrackstudio
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        continue-on-error: true

      - name: Run clippy
        run: nix develop --impure --command cargo clippy --workspace -- -D warnings

      - name: Check formatting
        run: nix develop --impure --command cargo fmt --check

      - name: Run tests
        run: nix develop --impure --command cargo nextest run --workspace

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: check
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Allow unprivileged user namespaces
        run: |
          if [ -f /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]; then
            echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns
          fi
          sudo sysctl -w kernel.unprivileged_userns_clone=1 2>/dev/null || true

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - uses: cachix/cachix-action@v15
        with:
          name: fasttrackstudio
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        continue-on-error: true

      - name: Build signal-extension
        run: nix build .#signal-extension --no-link --print-out-paths | tee /tmp/ext-path

      - name: Build fts-signal-controller
        run: nix build .#fts-signal-controller --no-link --print-out-paths | tee /tmp/ctrl-path

      - name: Push to Cachix
        run: |
          cachix push fasttrackstudio $(cat /tmp/ext-path) || true
          cachix push fasttrackstudio $(cat /tmp/ctrl-path) || true
        continue-on-error: true
